version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fastapi-postgres-1
    environment:
      POSTGRES_USER: ${DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATASOURCE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATASOURCE_DB:-bookstore}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATASOURCE_USERNAME:-postgres} -d ${DATASOURCE_DB:-bookstore}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
